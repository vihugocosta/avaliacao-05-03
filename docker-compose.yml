version: '3.8'

services:
  web:
    build: .
    container_name: site-exemplo-cicd
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
