name: CI/CD Pipeline

# Dispara o workflow em push ou pull request
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ============================================
  # JOB 1: VALIDAÇÃO DO CÓDIGO (LINT E TESTES)
  # ============================================
  validate:
    runs-on: ubuntu-latest
    name: Validar Código
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v3
    
    - name: ⚙️ Configurar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: 📦 Instalar dependências
      run: npm ci
    
    - name: 🔍 Executar linter (validar código)
      run: npm run lint
      continue-on-error: true
    
    - name: ✅ Executar testes automatizados
      run: npm test
    
    outputs:
      status: success

  # ============================================
  # JOB 2: BUILD E CONTAINERIZAÇÃO
  # ============================================
  # DEPENDÊNCIA: Este job SÓ roda se o job 'validate' passar
  build:
    runs-on: ubuntu-latest
    name: Build da Aplicação
    needs: validate  # ⚠️ DEPENDÊNCIA: Aguarda conclusão do job 'validate'
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v3
    
    - name: ⚙️ Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'
        cache: 'npm'
    
    - name: 📦 Instalar dependências
      run: npm ci
    
    - name: 🔨 Executar build
      run: npm run build
    
    - name: 🐳 Setup Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: 🏗️ Build da imagem Docker
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: site-exemplo-cicd:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    outputs:
      build-status: success

  # ============================================
  # JOB 3: DEPLOY E VARIÁVEIS SECRETAS
  # ============================================
  # DEPENDÊNCIA: Este job SÓ roda se o job 'build' passar
  deploy:
    runs-on: ubuntu-latest
    name: Deploy e Mensagem Secreta
    needs: build  # ⚠️ DEPENDÊNCIA: Aguarda conclusão do job 'build'
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v3
    
    - name: 🔐 Usar variável de ambiente secreta
      run: |
        echo "🔓 Acessando dados secretos..."
        echo "📝 Mensagem Secreta: ${{ secrets.SECRET_MESSAGE }}"
        echo "✅ Deploy simulado com sucesso!"
        echo "🚀 Aplicação pronta para produção"
      env:
        # Se o secret não estiver configurado, mostra uma mensagem padrão
        SECRET_MESSAGE: ${{ secrets.SECRET_MESSAGE || 'Esta é uma mensagem secreta do workflow!' }}
    
    - name: ✅ Confirmação final
      run: |
        echo "Pipeline CI/CD completado com sucesso! ✨"
        echo "Todos os jobs passaram:"
        echo "  ✓ validate (Validação do código)"
        echo "  ✓ build (Build da aplicação)"
        echo "  ✓ deploy (Deploy e segurança)"

  # ============================================
  # JOB 4: SCAN DE SEGURANÇA (INDEPENDENTE)
  # ============================================
  security-scan:
    runs-on: ubuntu-latest
    name: Scan de Vulnerabilidades
    
    steps:
    - name: 📥 Checkout do código
      uses: actions/checkout@v3
    
    - name: 🔒 Executar Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: 📊 Upload de resultados de segurança
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
